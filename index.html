<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">

<title>🤖 搞怪数字人</title>

<style>
  /* ===== Reset & Base ===== */
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; overflow: hidden; font-family: -apple-system, 'PingFang SC', 'Microsoft YaHei', sans-serif; background: #1a1a2e; color: #eee; }

  /* ===== Layout ===== */
  #app { display: flex; width: 100%; height: 100%; }

  /* 3D Viewport - 至少占 2/3 */
  #viewport { flex: 2.5; position: relative; overflow: hidden; background: linear-gradient(180deg, #16213e 0%, #0f3460 100%); touch-action: pinch-zoom; }
  #viewport canvas { width: 100% !important; height: 100% !important; }

  /* Chat Panel - 文字区背景全透明，不遮挡模型 */
  #chat-panel { width: 320px; min-width: 280px; display: flex; flex-direction: column; background: transparent; border-left: 1px solid rgba(255,255,255,0.04); }
  #chat-header { padding: 16px 20px; border-bottom: 1px solid rgba(255,255,255,0.05); font-size: 16px; font-weight: 700; display: flex; align-items: center; gap: 8px; background: transparent; }
  #chat-header .status { width: 8px; height: 8px; border-radius: 50%; background: #4ade80; display: inline-block; }
  #chat-messages { flex: 1; overflow-y: auto; padding: 12px 16px; display: flex; flex-direction: column; gap: 8px; background: transparent; }
  .msg { max-width: 88%; padding: 8px 14px; border-radius: 12px; font-size: 14px; line-height: 1.5; animation: fadeIn 0.3s ease; }
  .msg.user { align-self: flex-end; background: rgba(37,99,235,0.35); backdrop-filter: blur(4px); -webkit-backdrop-filter: blur(4px); color: white; border-bottom-right-radius: 4px; }
  .msg.bot { align-self: flex-start; background: rgba(255,255,255,0.04); backdrop-filter: blur(4px); -webkit-backdrop-filter: blur(4px); color: #ddd; border-bottom-left-radius: 4px; }
  .msg.system { align-self: center; background: rgba(251,191,36,0.06); backdrop-filter: blur(4px); -webkit-backdrop-filter: blur(4px); color: #fbbf24; font-size: 12px; border-radius: 20px; padding: 4px 12px; }
  .msg .mood-tag { font-size: 20px; margin-right: 6px; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

  #chat-input-area { padding: 12px 16px; border-top: 1px solid rgba(255,255,255,0.04); display: flex; gap: 8px; background: transparent; }
  #chat-input { flex: 1; background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.08); border-radius: 20px; padding: 10px 16px; color: white; font-size: 14px; outline: none; }
  #chat-input:focus { border-color: #2563eb; background: rgba(37,99,235,0.08); }
  #chat-input::placeholder { color: rgba(255,255,255,0.3); }
  .btn { border: none; border-radius: 20px; padding: 10px 18px; cursor: pointer; font-size: 14px; font-weight: 600; transition: all 0.2s; white-space: nowrap; }
  .btn:hover { transform: scale(1.05); }
  .btn:active { transform: scale(0.95); }
  .btn-primary { background: rgba(37,99,235,0.4); backdrop-filter: blur(4px); -webkit-backdrop-filter: blur(4px); color: white; }
  .btn-primary:hover { background: rgba(29,78,216,0.5); }
  .btn-mic { background: rgba(239,68,68,0.35); backdrop-filter: blur(4px); -webkit-backdrop-filter: blur(4px); color: white; border-radius: 50%; width: 40px; height: 40px; padding: 0; display: flex; align-items: center; justify-content: center; font-size: 18px; flex-shrink: 0; }
  .btn-mic.listening { background: rgba(220,38,38,0.6); animation: pulse 1s infinite; }
  @keyframes pulse { 0%, 100% { box-shadow: 0 0 0 0 rgba(239,68,68,0.5); } 50% { box-shadow: 0 0 0 10px rgba(239,68,68,0); } }

  /* Mood Sidebar - 右侧可收起 */
  #mood-sidebar { position: absolute; top: 50%; right: 0; transform: translateY(-50%); z-index: 15; display: flex; align-items: center; gap: 0; transition: transform 0.35s cubic-bezier(0.4, 0, 0.2, 1); }
  #mood-sidebar.collapsed { transform: translateY(-50%) translateX(calc(100% - 36px)); }
  #mood-toggle { width: 36px; height: 48px; background: rgba(0,0,0,0.4); backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px); border: 1px solid rgba(255,255,255,0.1); border-right: none; border-radius: 12px 0 0 12px; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 16px; color: rgba(255,255,255,0.6); transition: all 0.3s; flex-shrink: 0; }
  #mood-toggle:hover { background: rgba(37,99,235,0.4); color: white; }
  #mood-panel { padding: 10px 12px 10px 0; display: flex; flex-direction: column; gap: 4px; background: rgba(0,0,0,0.4); backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px); border: 1px solid rgba(255,255,255,0.08); border-right: none; border-radius: 16px 0 0 16px; }
  .tool-btn { background: rgba(255,255,255,0.06); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.08); border-radius: 10px; padding: 6px 12px; color: rgba(255,255,255,0.8); cursor: pointer; font-size: 12px; transition: all 0.25s; display: flex; align-items: center; gap: 6px; white-space: nowrap; }
  .tool-btn:hover { background: rgba(37,99,235,0.3); border-color: rgba(37,99,235,0.4); color: white; }
  .tool-btn.active { background: rgba(37,99,235,0.5); border-color: #2563eb; color: white; }
  .tool-btn .icon { font-size: 16px; }

  /* Viewport 底部半透明装饰条 */
  #viewport::after { content: ''; position: absolute; bottom: 0; left: 0; right: 0; height: 60px; background: linear-gradient(transparent, rgba(0,0,0,0.3)); pointer-events: none; z-index: 2; }

  /* Mood indicator */
  #mood-indicator { position: absolute; top: 16px; left: 16px; background: rgba(0,0,0,0.35); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); border-radius: 10px; padding: 6px 12px; font-size: 13px; color: rgba(255,255,255,0.8); z-index: 10; display: flex; align-items: center; gap: 6px; border: 1px solid rgba(255,255,255,0.06); }

  /* Settings */
  #settings-btn { position: absolute; top: 16px; right: 16px; background: rgba(0,0,0,0.35); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.06); border-radius: 50%; width: 36px; height: 36px; cursor: pointer; font-size: 18px; z-index: 20; display: flex; align-items: center; justify-content: center; color: white; transition: all 0.3s; }
  #settings-btn:hover { background: rgba(37,99,235,0.4); }
  #settings-panel { position: absolute; top: 0; right: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); backdrop-filter: blur(24px); -webkit-backdrop-filter: blur(24px); z-index: 30; display: none; flex-direction: column; padding: 60px 30px; overflow-y: auto; }
  #settings-panel.open { display: flex; }
  #settings-panel h2 { font-size: 20px; margin-bottom: 20px; }
  .setting-group { margin-bottom: 20px; }
  .setting-group label { display: block; font-size: 12px; color: rgba(255,255,255,0.5); margin-bottom: 6px; }
  .setting-group input, .setting-group textarea { width: 100%; background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.1); border-radius: 10px; padding: 10px 14px; color: white; font-size: 13px; outline: none; }
  .setting-group input:focus, .setting-group textarea:focus { border-color: #2563eb; }
  .setting-group textarea { resize: vertical; min-height: 60px; font-family: inherit; }
  .setting-group .hint { font-size: 11px; color: rgba(255,255,255,0.3); margin-top: 4px; }
  #settings-close { position: absolute; top: 16px; right: 20px; background: none; border: none; color: white; font-size: 24px; cursor: pointer; }

  .version-tag { text-align: center; font-size: 11px; color: rgba(255,255,255,0.25); margin-top: 16px; font-family: 'SF Mono', 'Menlo', monospace; letter-spacing: 0.5px; }

  /* Loading */
  #loading { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); text-align: center; z-index: 5; color: rgba(255,255,255,0.6); }
  #loading .spinner { width: 40px; height: 40px; border: 3px solid rgba(255,255,255,0.1); border-top-color: #2563eb; border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 12px; }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ===== Mobile ===== */
  @media (max-width: 768px) {
    #app { flex-direction: column; }
    #viewport { height: 68dvh; flex: none; }
    #chat-panel { width: 100%; min-width: unset; height: 32dvh; overflow: hidden; background: transparent; }
    #chat-messages { -webkit-overflow-scrolling: touch; overscroll-behavior: contain; background: transparent; }
    /* Mobile: mood sidebar 右侧竖排 */
    #mood-sidebar { top: 50%; right: 0; bottom: auto; left: auto; transform: translateY(-50%); }
    #mood-sidebar.collapsed { transform: translateY(-50%) translateX(calc(100% - 32px)); }
    #mood-toggle { width: 32px; height: 44px; font-size: 14px; }
    #mood-panel { flex-direction: column; padding: 6px 8px 6px 0; gap: 3px; border-radius: 14px 0 0 14px; }
    .tool-btn { padding: 4px 8px; font-size: 11px; gap: 4px; }
    .tool-btn .icon { font-size: 13px; }
    #settings-panel { padding: 40px 16px; }
    #chat-input-area { background: transparent; }
    #settings-btn { top: 12px; right: 12px; width: 32px; height: 32px; font-size: 15px; }
    #mood-indicator { top: 12px; left: 12px; padding: 4px 10px; font-size: 12px; }
  }
</style>

<script type="module">
import { TalkingHead } from 'talkinghead';

// ===== State =====
let head = null;
let isReady = false;
let chatHistory = [];
let isListening = false;
let recognition = null;

const moodIcons = { neutral: '😐', happy: '😄', love: '🥰', angry: '😤', sad: '😢', fear: '😨', disgust: '🤢', sleep: '😴' };
const moodLabels = { neutral: '中性', happy: '开心', love: '可爱', angry: '生气', sad: '难过', fear: '害怕', disgust: '嫌弃', sleep: '犯困' };

// ===== Load settings from localStorage =====
function loadSettings() {
  const keys = ['cfg-name','cfg-prompt','cfg-llm-key','cfg-llm-url','cfg-llm-model','cfg-tts-key','cfg-model-url'];
  keys.forEach(k => {
    const el = document.getElementById(k);
    const saved = localStorage.getItem(k);
    if (saved) el.value = saved;
  });
}
loadSettings();

function saveSettings() {
  const keys = ['cfg-name','cfg-prompt','cfg-llm-key','cfg-llm-url','cfg-llm-model','cfg-tts-key','cfg-model-url'];
  keys.forEach(k => localStorage.setItem(k, document.getElementById(k).value));
  document.getElementById('settings-panel').classList.remove('open');
  addSystemMsg('设置已保存 ✅');
  // Reload avatar if ready
  if (isReady && head) reloadAvatar();
}

window.saveSettings = saveSettings;

// ===== DOM refs =====
const nodeAvatar = document.getElementById('viewport');
const nodeLoading = document.getElementById('loading-text');
const chatMessages = document.getElementById('chat-messages');
const chatInput = document.getElementById('chat-input');

// ===== Init TalkingHead =====
async function initTalkingHead() {
  nodeLoading.textContent = '初始化数字人引擎...';
  
  const modelUrl = document.getElementById('cfg-model-url').value || 
    'https://cdn.jsdelivr.net/gh/met4citizen/TalkingHead@main/avatars/brunette.glb';
  const ttsKey = document.getElementById('cfg-tts-key').value;

  const config = {
    cameraView: 'full',
    ttsApikey: ttsKey || null,
    ttsEndpoint: ttsKey ? 'https://texttospeech.googleapis.com/v1beta1/text:synthesize' : null,
    lipsyncModules: ['en', 'zh'],
    lipsyncLang: 'en',
    avatarMood: 'neutral',
    modelMovementFactor: 0.8,
    cameraZoomEnable: true,
    cameraRotateEnable: true,
    cameraPanEnable: true,
  };

  if (!ttsKey) {
    // No TTS key - will use speakAudio with browser SpeechSynthesis
    config.ttsEndpoint = null;
    config.ttsApikey = null;
  }

  head = new TalkingHead(nodeAvatar, config);

  nodeLoading.textContent = '加载 3D 模型...';
  
  try {
    await head.showAvatar({
      url: modelUrl,
      body: 'F',
      avatarMood: 'neutral',
    }, (ev) => {
      if (ev.lengthComputable) {
        const pct = Math.min(100, Math.round(ev.loaded / ev.total * 100));
        nodeLoading.textContent = `加载中 ${pct}%`;
      }
    });
    
    nodeLoading.textContent = '就绪！';
    setTimeout(() => {
      document.getElementById('loading').style.display = 'none';
    }, 500);
    
    isReady = true;
    
    // Auto greeting with personality
    setTimeout(() => {
      const name = document.getElementById('cfg-name').value || '阿搞';
      speakText(`哎哟喂！${name}上线啦！老板好！今天咱整点啥？`);
    }, 1000);
    
  } catch (err) {
    nodeLoading.textContent = '❌ 加载失败: ' + err.message;
    console.error(err);
  }
}

// ===== Speaking =====
async function speakText(text) {
  if (!head || !isReady) return;
  
  const ttsKey = document.getElementById('cfg-tts-key').value;
  
  if (ttsKey) {
    // Use Google TTS with lip sync (best quality)
    try {
      await head.speakText(text);
    } catch (err) {
      console.warn('Google TTS failed, falling back to Edge TTS:', err);
      await edgeTTSFallback(text);
    }
  } else {
    // Use free Edge TTS with lip sync (no key needed)
    await edgeTTSFallback(text);
  }
}

// ===== Edge TTS (免费，不需要API Key，国内直连) =====
const EDGE_TTS_CONFIG = {
  TRUSTED_CLIENT_TOKEN: "6A5AA1D4EAFF4E9FB37E23D68491D6F4",
  WSS_URL: "wss://api.msedgeservices.com/tts/cognitiveservices/websocket/v1",
  VOICES_URL: "https://api.msedgeservices.com/tts/cognitiveservices/voices/list",
  VERSION_MS_GEC: "1-142.0.3595",
};

function edgeTTSGenerateUUID() {
  return 'xxxxxxxx-xxxx-xxxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g, c => {
    const r = Math.random() * 16 | 0;
    return (c === 'x' ? r : (r & 0x3 | 0x8)).toString(16);
  });
}

function edgeTTSGenerateToken() {
  const bytes = new Uint8Array(16);
  crypto.getRandomValues(bytes);
  return Array.from(bytes).map(b => b.toString(16).padStart(2,"0").toUpperCase()).join('');
}

async function edgeTTSGenerateSecMsGec(token) {
  const now = new Date().toUTCString();
  const date = new Date(now);
  const ticks = Math.floor(date.getTime() / 1000) + 11644473600;
  const rounded = ticks - (ticks % 300);
  const windowsTicks = rounded * 10000000;
  const encoder = new TextEncoder();
  const hashBuffer = await crypto.subtle.digest('SHA-256', encoder.encode(`${windowsTicks}${token}`));
  return Array.from(new Uint8Array(hashBuffer)).map(b => b.toString(16).padStart(2,'0')).join('').toUpperCase();
}

function edgeTTSCreateSSML(text, voice) {
  return `<speak version="1.0" xmlns="http://www.w3.org/2001/10/synthesis" xmlns:mstts="https://www.w3.org/2001/mstts" xml:lang="zh-CN"><voice name="${voice}"><prosody rate="0%" pitch="0Hz">${text.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}</prosody></voice></speak>`;
}

function edgeTTSBuildConfig() {
  const ts = new Date().toUTCString();
  return `X-Timestamp:${ts}\r\nContent-Type:application/json; charset=utf-8\r\nPath:speech.config\r\n\r\n{"context":{"synthesis":{"audio":{"metadataoptions":{"sentenceBoundaryEnabled":false,"wordBoundaryEnabled":true},"outputFormat":"audio-24khz-48kbitrate-mono-mp3"}}}}`;
}

function edgeTTSFindAudio(arr) {
  const needle = new TextEncoder().encode("Path:audio\r\n");
  for (let i = 0; i <= arr.length - needle.length; i++) {
    let match = true;
    for (let j = 0; j < needle.length; j++) {
      if (arr[i + j] !== needle[j]) { match = false; break; }
    }
    if (match) return i + needle.length;
  }
  return -1;
}

async function edgeTTSSpeak(text) {
  const voice = 'zh-CN-XiaoxiaoNeural'; // 晓晓，自然中文女声
  const secMsGEC = await edgeTTSGenerateSecMsGec(EDGE_TTS_CONFIG.TRUSTED_CLIENT_TOKEN);
  const reqId = edgeTTSGenerateUUID();
  const url = `${EDGE_TTS_CONFIG.WSS_URL}?Ocp-Apim-Subscription-Key=${EDGE_TTS_CONFIG.TRUSTED_CLIENT_TOKEN}&Sec-MS-GEC=${secMsGEC}&Sec-MS-GEC-Version=${EDGE_TTS_CONFIG.VERSION_MS_GEC}&ConnectionId=${reqId}`;
  
  const ws = new WebSocket(url);
  const audioChunks = [];
  
  await new Promise((resolve, reject) => {
    const timeout = setTimeout(() => { ws.close(); reject(new Error('Edge TTS timeout')); }, 30000);
    ws.onopen = () => {
      ws.send(edgeTTSBuildConfig());
      ws.send(`X-RequestId:${reqId}\r\nContent-Type:application/ssml+xml\r\nX-Timestamp:${new Date().toUTCString()}\r\nPath:ssml\r\n\r\n${edgeTTSCreateSSML(text, voice)}`);
    };
    ws.onmessage = (event) => {
      if (typeof event.data === 'string') {
        if (event.data.includes('Path:turn.end')) ws.close();
      } else {
        const reader = new FileReader();
        reader.onload = () => {
          const arr = new Uint8Array(reader.result);
          const start = edgeTTSFindAudio(arr);
          if (start !== -1) audioChunks.push(arr.slice(start));
        };
        reader.readAsArrayBuffer(event.data);
      }
    };
    ws.onerror = () => { clearTimeout(timeout); reject(new Error('Edge TTS WebSocket error')); };
    ws.onclose = () => { clearTimeout(timeout); resolve(); };
  });
  
  // Combine chunks
  const total = audioChunks.reduce((acc, c) => acc + c.length, 0);
  const combined = new Uint8Array(total);
  let off = 0;
  for (const chunk of audioChunks) { combined.set(chunk, off); off += chunk.length; }
  if (combined.length === 0) throw new Error('No audio received from Edge TTS');
  return combined.buffer;
}

// Split text into words with estimated timing for lip-sync
function estimateWordTiming(text) {
  // Split by spaces/punctuation for word-level timing
  const words = text.match(/[\p{L}\p{N}]+|[^\p{L}\p{N}\s]/gu) || [text];
  if (words.length === 0) return { words: [text], wtimes: [0], wdurations: [200 * text.length] };
  // Estimate: ~150ms per character, distributed across words
  const totalChars = words.reduce((s, w) => s + w.length, 0);
  const totalMs = Math.max(500, totalChars * 80);
  let accum = 0;
  const wtimes = [0];
  const wdurations = [];
  for (let i = 0; i < words.length; i++) {
    const dur = Math.max(80, (words[i].length / totalChars) * totalMs);
    wdurations.push(dur);
    if (i < words.length - 1) wtimes.push(accum + dur);
    accum += dur;
  }
  return { words, wtimes, wdurations };
}

async function edgeTTSFallback(text) {
  try {
    addSystemMsg('🔊 阿搞用免费语音说话中...');
    const mp3Buffer = await edgeTTSSpeak(text);
    // Decode MP3 ArrayBuffer → AudioBuffer (PCM) for TalkingHead lip-sync
    const audioBuffer = await head.audioCtx.decodeAudioData(mp3Buffer.slice(0));
    const { words, wtimes, wdurations } = estimateWordTiming(text);
    // speakAudio generates visemes from words automatically + plays audio with lip-sync
    head.speakAudio({
      words: words,
      wtimes: wtimes,
      wdurations: wdurations,
      audio: audioBuffer
    });
  } catch (err) {
    console.warn('Edge TTS failed, using browser SpeechSynthesis:', err);
    // Ultra fallback: browser SpeechSynthesis (no lip-sync)
    if (!window.speechSynthesis) return;
    window.speechSynthesis.cancel();
    const utterance = new SpeechSynthesisUtterance(text);
    utterance.lang = 'zh-CN';
    utterance.rate = 1.1;
    utterance.pitch = 1.2;
    const voices = window.speechSynthesis.getVoices();
    const zhVoice = voices.find(v => v.lang.startsWith('zh'));
    if (zhVoice) utterance.voice = zhVoice;
    window.speechSynthesis.speak(utterance);
  }
}

// ===== Chat (LLM) =====
async function sendMessage() {
  const text = chatInput.value.trim();
  if (!text) return;
  
  chatInput.value = '';
  addMessage(text, 'user');
  
  // Trim inputs to avoid whitespace/newline issues from copy-paste
  const llmKey = document.getElementById('cfg-llm-key').value.trim();
  const llmUrl = document.getElementById('cfg-llm-url').value.trim();
  const llmModel = document.getElementById('cfg-llm-model').value.trim();
  const prompt = document.getElementById('cfg-prompt').value;
  const name = document.getElementById('cfg-name').value || '阿搞';
  
  if (!llmKey) {
    addMessage(`${name}说: ${text}（配置API Key后可智能回复）`, 'bot');
    return;
  }
  
  // Validate URL
  let apiUrl;
  try {
    apiUrl = new URL(llmUrl);
  } catch {
    addMessage(`⚠️ API 地址格式不对: "${llmUrl}"`, 'bot');
    return;
  }
  
  try {
    const messages = [
      { role: 'system', content: prompt },
      ...chatHistory.slice(-10),
      { role: 'user', content: text }
    ];
    
    // 30s timeout so fetch doesn't hang forever
    const controller = new AbortController();
    const timeoutId = setTimeout(() => controller.abort(), 30000);
    
    const resp = await fetch(apiUrl, {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'Authorization': `Bearer ${llmKey}`,
        'HTTP-Referer': window.location.origin,
        'X-Title': 'Gaoguai Digital Human'
      },
      body: JSON.stringify({
        model: llmModel,
        messages: messages,
        stream: false,
        max_tokens: 500
      }),
      signal: controller.signal
    });
    
    clearTimeout(timeoutId);
    
    if (!resp.ok) {
      const errText = await resp.text().catch(() => '');
      throw new Error(`API ${resp.status} ${resp.statusText}${errText ? ': ' + errText.slice(0,100) : ''}`);
    }
    
    const data = await resp.json();
    const reply = data.choices?.[0]?.message?.content || '嗯...我词穷了';
    
    chatHistory.push({ role: 'user', content: text });
    chatHistory.push({ role: 'assistant', content: reply });
    
    detectMoodFromText(reply);
    
    addMessage(reply, 'bot');
    speakText(reply);
    
  } catch (err) {
    if (err.name === 'AbortError') {
      addMessage('⚠️ 阿搞卡住了: 请求超时（30秒），请检查网络或 API 地址', 'bot');
    } else if (err.message === 'Failed to fetch' || err.message.includes('NetworkError')) {
      addMessage('⚠️ 阿搞卡住了: 网络请求失败，请检查 API 地址和网络连接', 'bot');
    } else {
      addMessage(`⚠️ 阿搞卡住了: ${err.message}`, 'bot');
    }
  }
}

window.sendMessage = sendMessage;

function detectMoodFromText(text) {
  const moodMap = [
    { words: ['哈哈','笑死','搞笑','逗','整活','嗨'], mood: 'happy' },
    { words: ['爱','喜欢','亲','么','贴贴'], mood: 'love' },
    { words: ['气','烦','滚','火大'], mood: 'angry' },
    { words: ['哭','难过','伤心','呜呜'], mood: 'sad' },
    { words: ['怕','慌','救命'], mood: 'fear' },
    { words: ['呕','恶心','嫌弃'], mood: 'disgust' },
    { words: ['困','累','睡'], mood: 'sleep' },
  ];
  for (const entry of moodMap) {
    if (entry.words.some(w => text.includes(w))) {
      setMood(entry.mood);
      return;
    }
  }
  setMood('neutral');
}

// ===== Voice Input =====
window.toggleMic = function() {
  const btn = document.getElementById('mic-btn');
  if (isListening) {
    stopListening();
    btn.classList.remove('listening');
    btn.textContent = '🎤';
    isListening = false;
  } else {
    startListening();
    btn.classList.add('listening');
    btn.textContent = '🔴';
    isListening = true;
  }
};

function startListening() {
  if (!('webkitSpeechRecognition' in window) && !('SpeechRecognition' in window)) {
    addSystemMsg('⚠️ 浏览器不支持语音输入，请用 Chrome');
    return;
  }
  
  const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
  recognition = new SpeechRecognition();
  recognition.lang = 'zh-CN';
  recognition.continuous = false;
  recognition.interimResults = false;
  
  recognition.onresult = (event) => {
    const transcript = event.results[0][0].transcript;
    chatInput.value = transcript;
    stopListening();
    document.getElementById('mic-btn').classList.remove('listening');
    document.getElementById('mic-btn').textContent = '🎤';
    isListening = false;
    sendMessage();
  };
  
  recognition.onerror = (event) => {
    console.warn('Speech error:', event.error);
    stopListening();
    document.getElementById('mic-btn').classList.remove('listening');
    document.getElementById('mic-btn').textContent = '🎤';
    isListening = false;
    if (event.error !== 'no-speech') {
      addSystemMsg(`⚠️ 语音识别出错: ${event.error}`);
    }
  };
  
  recognition.start();
}

function stopListening() {
  if (recognition) {
    try { recognition.stop(); } catch(e) {}
    recognition = null;
  }
}

// ===== UI Helpers =====
function addMessage(text, role, mood) {
  const div = document.createElement('div');
  div.className = `msg ${role}`;
  if (mood) div.innerHTML = `<span class="mood-tag">${moodIcons[mood] || ''}</span>${text}`;
  else div.textContent = text;
  chatMessages.appendChild(div);
  chatMessages.scrollTop = chatMessages.scrollHeight;
}

function addSystemMsg(text) {
  const div = document.createElement('div');
  div.className = 'msg system';
  div.textContent = text;
  chatMessages.appendChild(div);
  chatMessages.scrollTop = chatMessages.scrollHeight;
}
