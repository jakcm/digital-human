<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>🤖 搞怪数字人</title>

<style>
  /* ===== Reset & Base ===== */
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; overflow: hidden; font-family: -apple-system, 'PingFang SC', 'Microsoft YaHei', sans-serif; color: #eee; }

  /* ===== Fullscreen Layout ===== */
  #app { position: relative; width: 100%; height: 100%; background: #1a1a2e; }

  /* 3D Viewport — 全屏 */
  #viewport { position: absolute; inset: 0; overflow: hidden; touch-action: pinch-zoom; }
  #viewport canvas { width: 100% !important; height: 100% !important; display: block; }

  /* Viewport 底部装饰渐变 (overlay + z-index 保证在 canvas 之上) */
  #viewport::after {
    content: ''; position: absolute; bottom: 0; left: 0; right: 0;
    height: 160px;
    background: linear-gradient(transparent 20%, rgba(0,0,0,0.35) 100%);
    pointer-events: none; z-index: 2;
  }

  /* ===== Chat Overlay — 浮动在模型上方 ===== */
  #chat-panel {
    position: absolute; bottom: 0; left: 0; right: 0;
    z-index: 10;
    pointer-events: none; /* 让点击穿透到 viewport，只有子元素可交互 */
  }

  #chat-messages {
    max-height: 45vh; overflow-y: auto;
    padding: 16px 16px 8px 16px;
    display: flex; flex-direction: column; gap: 6px;
    pointer-events: auto; /* 消息区域可滚动交互 */
    background: transparent;
    scrollbar-width: thin;
    scrollbar-color: rgba(255,255,255,0.08) transparent;
  }
  #chat-messages::-webkit-scrollbar { width: 3px; }
  #chat-messages::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.08); border-radius: 3px; }
  #chat-messages::-webkit-scrollbar-track { background: transparent; }

  .msg {
    max-width: 75%;
    padding: 8px 14px;
    border-radius: 14px;
    font-size: 14px;
    line-height: 1.5;
    animation: msgIn 0.35s cubic-bezier(0.16, 1, 0.3, 1);
    word-break: break-word;
    text-shadow: 0 1px 4px rgba(0,0,0,0.8), 0 0 8px rgba(0,0,0,0.5);
  }
  .msg.user {
    align-self: flex-end;
    background: transparent;
    color: #b4d0ff;
    border-bottom-right-radius: 4px;
  }
  .msg.bot {
    align-self: flex-start;
    background: transparent;
    color: #f0f0f0;
    border-bottom-left-radius: 4px;
  }
  .msg.system {
    align-self: center;
    background: transparent;
    color: #fbbf24;
    font-size: 12px;
    border-radius: 20px;
    padding: 4px 14px;
  }
  .msg .mood-tag { font-size: 20px; margin-right: 6px; }

  @keyframes msgIn {
    from { opacity: 0; transform: translateY(12px) scale(0.96); }
    to { opacity: 1; transform: translateY(0) scale(1); }
  }

  /* ===== Chat Input Bar ===== */
  #chat-input-area {
    padding: 8px 16px 20px 16px;
    display: flex; gap: 8px;
    align-items: center;
    pointer-events: auto; /* 输入框可交互 */
    background: transparent;
  }
  #chat-input {
    flex: 1;
    background: rgba(255,255,255,0.07);
    backdrop-filter: blur(16px);
    -webkit-backdrop-filter: blur(16px);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 22px;
    padding: 10px 18px;
    color: white;
    font-size: 14px;
    outline: none;
    transition: all 0.25s;
    pointer-events: auto;
  }
  #chat-input:focus {
    border-color: rgba(37,99,235,0.6);
    background: rgba(37,99,235,0.06);
    box-shadow: 0 0 0 1px rgba(37,99,235,0.15);
  }
  #chat-input::placeholder { color: rgba(255,255,255,0.25); }

  .btn {
    border: none;
    border-radius: 22px;
    padding: 10px 20px;
    cursor: pointer;
    font-size: 14px;
    font-weight: 600;
    transition: all 0.2s;
    white-space: nowrap;
    pointer-events: auto;
  }
  .btn:hover { transform: scale(1.04); }
  .btn:active { transform: scale(0.94); }

  .btn-primary {
    background: rgba(37,99,235,0.45);
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    color: white;
    border: 1px solid rgba(37,99,235,0.2);
  }
  .btn-primary:hover { background: rgba(37,99,235,0.6); }

  .btn-mic {
    background: rgba(239,68,68,0.35);
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    color: white;
    border: 1px solid rgba(239,68,68,0.15);
    border-radius: 50%;
    width: 42px; height: 42px;
    padding: 0;
    display: flex; align-items: center; justify-content: center;
    font-size: 18px;
    flex-shrink: 0;
  }
  .btn-mic.listening {
    background: rgba(220,38,38,0.6);
    animation: pulse 1s infinite;
  }
  @keyframes pulse {
    0%, 100% { box-shadow: 0 0 0 0 rgba(239,68,68,0.4); }
    50% { box-shadow: 0 0 0 12px rgba(239,68,68,0); }
  }

  /* ===== Mood Sidebar — 右侧浮动 ===== */
  #mood-sidebar {
    position: absolute; top: 50%; right: 0; transform: translateY(-50%);
    z-index: 15;
    display: flex; align-items: center; gap: 0;
    transition: transform 0.35s cubic-bezier(0.4, 0, 0.2, 1);
  }
  #mood-sidebar.collapsed { transform: translateY(-50%) translateX(calc(100% - 36px)); }
  #mood-toggle {
    width: 36px; height: 48px;
    background: rgba(0,0,0,0.3); backdrop-filter: blur(16px);
    -webkit-backdrop-filter: blur(16px);
    border: 1px solid rgba(255,255,255,0.06);
    border-right: none; border-radius: 12px 0 0 12px;
    cursor: pointer; display: flex; align-items: center; justify-content: center;
    font-size: 16px; color: rgba(255,255,255,0.5);
    transition: all 0.3s; flex-shrink: 0;
  }
  #mood-toggle:hover { background: rgba(37,99,235,0.3); color: white; }
  #mood-panel {
    padding: 10px 12px 10px 0;
    display: flex; flex-direction: column; gap: 4px;
    background: rgba(0,0,0,0.3); backdrop-filter: blur(16px);
    -webkit-backdrop-filter: blur(16px);
    border: 1px solid rgba(255,255,255,0.05);
    border-right: none; border-radius: 16px 0 0 16px;
  }
  .tool-btn {
    background: rgba(255,255,255,0.04);
    backdrop-filter: blur(10px);
    border: 1px solid rgba(255,255,255,0.06);
    border-radius: 10px;
    padding: 6px 12px;
    color: rgba(255,255,255,0.7);
    cursor: pointer;
    font-size: 12px;
    transition: all 0.25s;
    display: flex; align-items: center; gap: 6px;
    white-space: nowrap;
  }
  .tool-btn:hover { background: rgba(37,99,235,0.25); border-color: rgba(37,99,235,0.3); color: white; }
  .tool-btn.active { background: rgba(37,99,235,0.4); border-color: #2563eb; color: white; }
  .tool-btn .icon { font-size: 16px; }

  /* ===== Mood Indicator ===== */
  #mood-indicator {
    position: absolute; top: 16px; left: 16px;
    background: rgba(0,0,0,0.25); backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    border-radius: 10px;
    padding: 6px 12px;
    font-size: 13px; color: rgba(255,255,255,0.7);
    z-index: 10;
    display: flex; align-items: center; gap: 6px;
    border: 1px solid rgba(255,255,255,0.04);
  }

  /* ===== Settings ===== */
  #settings-btn {
    position: absolute; top: 16px; right: 16px;
    background: rgba(0,0,0,0.25); backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    border: 1px solid rgba(255,255,255,0.04);
    border-radius: 50%;
    width: 36px; height: 36px;
    cursor: pointer; font-size: 18px;
    z-index: 20;
    display: flex; align-items: center; justify-content: center;
    color: white; transition: all 0.3s;
  }
  #settings-btn:hover { background: rgba(37,99,235,0.3); }

  #settings-panel {
    position: absolute; top: 0; right: 0;
    width: 100%; height: 100%;
    background: rgba(0,0,0,0.6);
    backdrop-filter: blur(24px);
    -webkit-backdrop-filter: blur(24px);
    z-index: 30;
    display: none;
    flex-direction: column;
    padding: 60px 30px;
    overflow-y: auto;
  }
  #settings-panel.open { display: flex; }
  #settings-panel h2 { font-size: 20px; margin-bottom: 20px; color: #eee; }
  .setting-group { margin-bottom: 20px; }
  .setting-group label {
    display: block; font-size: 12px;
    color: rgba(255,255,255,0.4);
    margin-bottom: 6px;
  }
  .setting-group input, .setting-group textarea {
    width: 100%;
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 10px;
    padding: 10px 14px;
    color: white; font-size: 13px;
    outline: none;
    transition: border-color 0.2s;
  }
  .setting-group input:focus, .setting-group textarea:focus {
    border-color: rgba(37,99,235,0.5);
  }
  .setting-group textarea { resize: vertical; min-height: 60px; font-family: inherit; }
  .setting-group .hint { font-size: 11px; color: rgba(255,255,255,0.25); margin-top: 4px; }
  #settings-close {
    position: absolute; top: 16px; right: 20px;
    background: none; border: none;
    color: white; font-size: 24px;
    cursor: pointer;
  }

  .version-tag {
    text-align: center;
    font-size: 11px;
    color: rgba(255,255,255,0.2);
    margin-top: 16px;
    font-family: 'SF Mono', 'Menlo', monospace;
    letter-spacing: 0.5px;
  }

  /* ===== Loading ===== */
  #loading {
    position: absolute; top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    text-align: center;
    z-index: 5;
    color: rgba(255,255,255,0.5);
  }
  #loading .spinner {
    width: 40px; height: 40px;
    border: 3px solid rgba(255,255,255,0.06);
    border-top-color: rgba(37,99,235,0.6);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin: 0 auto 12px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ===== Mobile ===== */
  @media (max-width: 768px) {
    #chat-messages { max-height: 35vh; padding: 12px 12px 4px; }
    .msg { max-width: 85%; padding: 7px 12px; font-size: 13px; }
    #chat-input-area { padding: 6px 12px 16px; }
    #chat-input { font-size: 13px; padding: 9px 14px; }
    .btn { padding: 9px 16px; font-size: 13px; }
    .btn-mic { width: 38px; height: 38px; font-size: 16px; }

    #mood-sidebar { top: 50%; right: 0; transform: translateY(-50%); }
    #mood-sidebar.collapsed { transform: translateY(-50%) translateX(calc(100% - 32px)); }
    #mood-toggle { width: 32px; height: 44px; font-size: 14px; }
    #mood-panel { flex-direction: column; padding: 6px 8px 6px 0; gap: 3px; border-radius: 14px 0 0 14px; }
    .tool-btn { padding: 4px 8px; font-size: 11px; gap: 4px; }
    .tool-btn .icon { font-size: 13px; }

    #settings-panel { padding: 40px 16px; }
    #settings-btn { top: 12px; right: 12px; width: 32px; height: 32px; font-size: 15px; }
    #mood-indicator { top: 12px; left: 12px; padding: 4px 10px; font-size: 12px; }

    #viewport::after { height: 120px; }
  }
</style>
</head>
<body>

<div id="app">
  <!-- 3D Viewport — 全屏 -->
  <div id="viewport">
    <div id="loading"><div class="spinner"></div><div id="loading-text">加载数字人...</div></div>
    <div id="mood-indicator"><span id="mood-icon">😊</span> <span id="mood-label">中性</span></div>
    <button id="settings-btn">⚙️</button>

    <!-- Mood Sidebar — 右侧浮动 -->
    <div id="mood-sidebar">
      <div id="mood-panel">
        <button class="tool-btn" data-mood="neutral" onclick="setMood('neutral')"><span class="icon">😐</span> 正常</button>
        <button class="tool-btn" data-mood="happy" onclick="setMood('happy')"><span class="icon">😄</span> 开心</button>
        <button class="tool-btn" data-mood="love" onclick="setMood('love')"><span class="icon">🥰</span> 可爱</button>
        <button class="tool-btn" data-mood="angry" onclick="setMood('angry')"><span class="icon">😤</span> 生气</button>
        <button class="tool-btn" data-mood="sad" onclick="setMood('sad')"><span class="icon">😢</span> 难过</button>
        <button class="tool-btn" data-mood="fear" onclick="setMood('fear')"><span class="icon">😨</span> 害怕</button>
        <button class="tool-btn" data-mood="disgust" onclick="setMood('disgust')"><span class="icon">🤢</span> 嫌弃</button>
        <button class="tool-btn" data-mood="sleep" onclick="setMood('sleep')"><span class="icon">😴</span> 犯困</button>
        <button class="tool-btn" onclick="doDance()"><span class="icon">💃</span> 跳舞</button>
      </div>
      <button id="mood-toggle" onclick="toggleMoodSidebar()">🎭</button>
    </div>

    <!-- Settings Panel -->
    <div id="settings-panel">
      <button id="settings-close">✕</button>
      <h2>⚙️ 设置</h2>
      <div class="setting-group">
        <label>数字人名字</label>
        <input id="cfg-name" value="阿搞" placeholder="数字人名字">
      </div>
      <div class="setting-group">
        <label>性格设定（Prompt）</label>
        <textarea id="cfg-prompt" rows="3">你是一个叫阿搞的AI数字人，性格搞笑幽默、豪爽大方、说话带梗、爱开玩笑。你是老板的好哥们，说话要接地气、有梗有料、偶尔自黑。回答简短有趣，别太正经，多用网络热梗和表情描述。</textarea>
        <div class="hint">设定数字人的性格和说话风格</div>
      </div>
      <div class="setting-group">
        <label>LLM API Key（对话用）</label>
        <input id="cfg-llm-key" type="text" placeholder="sk-or-v1-...">
        <div class="hint">支持 OpenAI / DeepSeek / 任何兼容 API</div>
      </div>
      <div class="setting-group">
        <label>LLM API 地址</label>
        <input id="cfg-llm-url" value="https://openrouter.ai/api/v1/chat/completions" placeholder="https://openrouter.ai/api/v1/chat/completions">
      </div>
      <div class="setting-group">
        <label>LLM 模型名</label>
        <input id="cfg-llm-model" value="deepseek/deepseek-v4-flash" placeholder="openai/gpt-4o">
      </div>
      <div class="setting-group">
        <label>Google TTS API Key（说话用，免费 100万字符/月）</label>
        <input id="cfg-tts-key" type="password" placeholder="AIza...">
        <div class="hint">不填则使用 Edge 免费 TTS（含精准唇同步 ✅）</div>
      </div>
      <div class="setting-group">
        <label>模型来源</label>
        <div id="cfg-model-source" style="display:flex;flex-direction:column;gap:6px;margin-top:4px;">
          <label style="display:flex;align-items:center;gap:8px;cursor:pointer;padding:8px 12px;background:rgba(255,255,255,0.04);border-radius:10px;border:1px solid rgba(255,255,255,0.06);transition:all 0.2s;">
            <input type="radio" name="model-source" value="builtin" style="accent-color:#2563eb;">
            <span>🏰 内置公主模型</span>
          </label>
          <label style="display:flex;align-items:center;gap:8px;cursor:pointer;padding:8px 12px;background:rgba(255,255,255,0.04);border-radius:10px;border:1px solid rgba(255,255,255,0.06);transition:all 0.2s;">
            <input type="radio" name="model-source" value="remote" style="accent-color:#2563eb;">
            <span>🌐 远程模型 URL</span>
          </label>
        </div>
        <div class="hint" id="model-source-hint">内置公主模型，可爱又省心 ✨</div>
      </div>
      <div class="setting-group" id="cfg-model-url-group">
        <label>3D 模型 URL</label>
        <input id="cfg-model-url" value="https://cdn.jsdelivr.net/gh/met4citizen/TalkingHead@main/avatars/brunette.glb" placeholder="GLB/GLTF 模型URL">
      </div>
      <div class="setting-group">
        <label>唇形同步偏移（毫秒）</label>
        <input id="cfg-lipsync-offset" type="number" value="-120" placeholder="-120">
        <div class="hint">负数=嘴型提前，正数=嘴型延后。建议范围 -220 到 120。</div>
      </div>
      <button class="btn btn-primary" onclick="saveSettings()" style="width:100%;margin-top:10px;">💾 保存设置</button>
      <div class="version-tag">v20260707-091218</div>
    </div>
  </div>

  <!-- Chat Overlay — 浮动在模型之上，无标题栏 -->
  <div id="chat-panel">
    <div id="chat-messages">
      <div class="msg system">🎉 阿搞已上线！跟老板打个招呼吧~</div>
      <div class="msg bot"><span class="mood-tag">😄</span> 哟！老板来啦！俺阿搞等你好久了，今天有啥好事要整？</div>
    </div>
    <div id="chat-input-area">
      <input id="chat-input" type="text" placeholder="跟阿搞聊两句..." onkeydown="if(event.key==='Enter')sendMessage()">
      <button class="btn btn-mic" id="mic-btn" onclick="toggleMic()" title="语音输入">🎤</button>
      <button class="btn btn-primary" onclick="sendMessage()">发送</button>
    </div>
  </div>
</div>

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.180.0/build/three.module.js/+esm",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.180.0/examples/jsm/",
    "talkinghead": "https://cdn.jsdelivr.net/gh/met4citizen/TalkingHead@1.7/modules/talkinghead.mjs"
  }
}
</script>

<script type="module">
import { TalkingHead } from 'talkinghead';

// ===== State =====
let head = null;
let isReady = false;
let chatHistory = [];
let isListening = false;
let recognition = null;
const debugState = {
  lastEdgeResult: null,
  lastSpeakAudioPayload: null,
  lastSpeakAudioOptions: null,
  lastError: null,
  events: [],
};
window.__digitalHumanDebug = debugState;

const moodIcons = { neutral: '😐', happy: '😄', love: '🥰', angry: '😤', sad: '😢', fear: '😨', disgust: '🤢', sleep: '😴' };
const moodLabels = { neutral: '中性', happy: '开心', love: '可爱', angry: '生气', sad: '难过', fear: '害怕', disgust: '嫌弃', sleep: '犯困' };

// ===== Load settings from localStorage =====
function loadSettings() {
  const keys = ['cfg-name','cfg-prompt','cfg-llm-key','cfg-llm-url','cfg-llm-model','cfg-tts-key','cfg-model-url','cfg-lipsync-offset'];
  keys.forEach(k => {
    const el = document.getElementById(k);
    const saved = localStorage.getItem(k);
    if (saved) el.value = saved;
  });
  // Restore model source selection
  const savedSource = localStorage.getItem('cfg-model-source') || 'builtin';
  const radios = document.querySelectorAll('input[name="model-source"]');
  radios.forEach(r => { if (r.value === savedSource) r.checked = true; });
  toggleModelSourceUI(savedSource);
}
loadSettings();

function toggleModelSourceUI(source) {
  const urlGroup = document.getElementById('cfg-model-url-group');
  const hint = document.getElementById('model-source-hint');
  if (source === 'builtin') {
    urlGroup.style.display = 'none';
    hint.textContent = '内置公主模型，可爱又省心 ✨';
  } else {
    urlGroup.style.display = 'block';
    hint.textContent = '输入任意 GLB/GLTF 模型 URL';
  }
}

function saveSettings() {
  const keys = ['cfg-name','cfg-prompt','cfg-llm-key','cfg-llm-url','cfg-llm-model','cfg-tts-key','cfg-model-url','cfg-lipsync-offset'];
  keys.forEach(k => localStorage.setItem(k, document.getElementById(k).value));
  // Save model source selection
  const selected = document.querySelector('input[name="model-source"]:checked');
  if (selected) localStorage.setItem('cfg-model-source', selected.value);
  document.getElementById('settings-panel').classList.remove('open');
  addSystemMsg('设置已保存 ✅');
  if (isReady && head) reloadAvatar();
}
window.saveSettings = saveSettings;

function getModelUrl() {
  const selected = document.querySelector('input[name="model-source"]:checked');
  if (selected && selected.value === 'builtin') {
    return 'models/princess.glb';
  }
  return document.getElementById('cfg-model-url').value ||
    'https://cdn.jsdelivr.net/gh/met4citizen/TalkingHead@main/avatars/brunette.glb';
}

// Model source radio change handler
document.querySelectorAll('input[name="model-source"]').forEach(r => {
  r.addEventListener('change', () => {
    if (r.checked) toggleModelSourceUI(r.value);
  });
});

// ===== DOM refs =====
const nodeAvatar = document.getElementById('viewport');
const nodeLoading = document.getElementById('loading-text');
const chatMessages = document.getElementById('chat-messages');
const chatInput = document.getElementById('chat-input');

// ===== Init TalkingHead =====
async function initTalkingHead() {
  nodeLoading.textContent = '初始化数字人引擎...';

  const modelUrl = getModelUrl();
  const ttsKey = document.getElementById('cfg-tts-key').value;

  const config = {
    cameraView: 'full',
    ttsApikey: ttsKey || null,
    ttsEndpoint: ttsKey ? 'https://texttospeech.googleapis.com/v1beta1/text:synthesize' : null,
    // TalkingHead 1.7 has no bundled lipsync-zh.mjs. Edge TTS fallback below
    // provides explicit viseme timings, so keep built-in lip-sync on a known-good module.
    lipsyncModules: ['en'],
    lipsyncLang: 'en',
    avatarMood: 'neutral',
    modelMovementFactor: 0.8,
    cameraZoomEnable: true,
    cameraRotateEnable: true,

// ===== Edge TTS (免费，不需要API Key，国内直连) =====
// 完整实现：解析 WebSocket word boundary 事件获取精准时间戳，实现唇同步
const EDGE_TTS_CONFIG = {
  TRUSTED_CLIENT_TOKEN: "6A5AA1D4EAFF4E9FB37E23D68491D6F4",
  WSS_URL: "wss://speech.platform.bing.com/consumer/speech/synthesize/readaloud/edge/v1",
  VERSION_MS_GEC: "1-142.0.3595",
};

function edgeTTSGenerateUUID() {
  return 'xxxxxxxx-xxxx-xxxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g, c => {
    const r = Math.random() * 16 | 0;
    return (c === 'x' ? r : (r & 0x3 | 0x8)).toString(16);
  });
}

async function edgeTTSGenerateSecMsGec(token) {
  const now = new Date().toUTCString();
  const date = new Date(now);
  const ticks = Math.floor(date.getTime() / 1000) + 11644473600;
  const rounded = ticks - (ticks % 300);
  const windowsTicks = rounded * 10000000;
  const encoder = new TextEncoder();
  const hashBuffer = await crypto.subtle.digest('SHA-256', encoder.encode(`${windowsTicks}${token}`));
  return Array.from(new Uint8Array(hashBuffer)).map(b => b.toString(16).padStart(2,'0')).join('').toUpperCase();
}

function edgeTTSCreateSSML(text, voice) {
  return `<speak version="1.0" xmlns="http://www.w3.org/2001/10/synthesis" xmlns:mstts="https://www.w3.org/2001/mstts" xml:lang="zh-CN"><voice name="${voice}"><prosody rate="0%" pitch="0Hz">${text.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\"/g,'&quot;')}</prosody></voice></speak>`;
}

function edgeTTSBuildConfig() {
  const ts = new Date().toUTCString();
  return `X-Timestamp:${ts}\r\nContent-Type:application/json; charset=utf-8\r\nPath:speech.config\r\n\r\n{"context":{"synthesis":{"audio":{"metadataoptions":{"sentenceBoundaryEnabled":false,"wordBoundaryEnabled":true},"outputFormat":"audio-24khz-48kbitrate-mono-mp3"}}}}`;
}

/**
 * Find the start of binary audio data after "Path:audio\r\n" header in a WebSocket binary message.
 */
function edgeTTSFindAudio(arr) {
  const needle = new TextEncoder().encode("Path:audio\r\n");
  for (let i = 0; i <= arr.length - needle.length; i++) {
    let match = true;
    for (let j = 0; j < needle.length; j++) {
      if (arr[i + j] !== needle[j]) { match = false; break; }
    }
    if (match) return i + needle.length;
  }
  return -1;
}

/**
 * Parse word boundary JSON from Edge TTS text messages (Path:audio.metadata / Path:rbsp).
 * Handles the current Metadata[] protocol plus older nested/flat formats.
 * Returns {word, startMs, durMs} or null.
 */
function edgeTTSParseWordBoundary(textMsg) {
  try {
    // Extract JSON body after \r\n\r\n separator
    const parts = textMsg.split('\r\n\r\n');
    if (parts.length < 2) return null;
    const json = JSON.parse(parts[parts.length - 1]);

    let item = json;
    if (Array.isArray(json.Metadata)) {
      item = json.Metadata.find(m => String(m.Type || m.type || '').toLowerCase() === 'wordboundary');
      if (!item) return null;
    }

    const eventType = String(item.Type || item.type || '').toLowerCase();
    if (eventType !== 'wordboundary') return null;

    let word, offset, duration;

    if (item.Data && item.Data.text) {
      // Nested format: {Data: {Offset, Duration, text: {Text}}}
      word = item.Data.text.Text || item.Data.text.text;
      offset = item.Data.Offset || 0;
      duration = item.Data.Duration || 0;
    } else {
      // Flat format: {Text, Offset, Duration} or {text, offset, duration}
      word = item.Text || item.text || '';
      offset = item.Offset !== undefined ? item.Offset : (item.offset || 0);
      duration = item.Duration !== undefined ? item.Duration : (item.duration || 0);
    }

    // Skip non-word boundaries (sentence boundaries, etc.)
    const boundaryType = (item.Data?.text?.BoundaryType || item.boundaryType || '').toLowerCase();
    if (boundaryType === 'sentence') return null;

    // Skip empty words
    if (!word || !word.trim()) return null;

    // Convert ticks (100 ns) → ms
    const startMs = offset / 10000;
    const durMs = duration / 10000;

    return { word: word.trim(), startMs, durMs };
  } catch (e) {
    return null;
  }
}

function edgeTTSVisemeForToken(token) {
  const s = String(token || '').toLowerCase();
  if (!s) return 'sil';
  if (/^[\u4e00-\u9fff]$/.test(s)) {
    // No browser-side Chinese phonemizer is bundled. Use deterministic, varied
    // open-mouth visemes per Han character so Chinese Edge TTS still animates.
    return ['aa', 'E', 'I', 'O', 'U'][s.charCodeAt(0) % 5];
  }
  if (/^(b|p|m)/.test(s)) return 'PP';
  if (/^(f|v)/.test(s)) return 'FF';
  if (/^th/.test(s)) return 'TH';
  if (/^(ch|sh|j)/.test(s)) return 'CH';
  if (/^(s|z|c|x)/.test(s)) return 'SS';
  if (/^(d|t|l)/.test(s)) return 'DD';
  if (/^n/.test(s)) return 'nn';
  if (/^r/.test(s)) return 'RR';
  if (/^(k|g|q)/.test(s)) return 'kk';
  if (/[a]/.test(s)) return 'aa';
  if (/[e]/.test(s)) return 'E';
  if (/[i|y]/.test(s)) return 'I';
  if (/[o]/.test(s)) return 'O';
  if (/[u|w]/.test(s)) return 'U';
  return 'aa';
}

function edgeTTSTokenizeForVisemes(word) {
  const tokens = [];
  const parts = String(word || '').match(/[\u4e00-\u9fff]|th|ch|sh|[a-zA-Z]+|\d/g) || [];
  for (const part of parts) {
    if (/^[a-zA-Z]+$/.test(part)) {
      const clusters = part.match(/th|ch|sh|[bcdfghjklmnpqrstvwxyz]+|[aeiouy]+/gi) || [part];
      tokens.push(...clusters);
    } else {
      tokens.push(part);
    }
  }
  return tokens.length ? tokens : [word];
}

function edgeTTSBuildVisemes(boundaries) {
  const visemes = [];
  const vtimes = [];
  const vdurations = [];
  const words = [];
  const wtimes = [];
  const wdurations = [];

  for (const b of boundaries) {
    const tokens = edgeTTSTokenizeForVisemes(b.word);
    const totalDur = Math.max(b.durMs || 0, tokens.length * 70);
    const slot = totalDur / Math.max(tokens.length, 1);

    tokens.forEach((token, i) => {
      const t = Math.round(b.startMs + i * slot);
      const d = Math.max(60, Math.round(slot));
      const viseme = edgeTTSVisemeForToken(token);
      const pseudoWord = String(token || b.word || viseme || 'a');

      words.push(pseudoWord);
      wtimes.push(t);
      wdurations.push(d);
      visemes.push(viseme);
      vtimes.push(t);
      vdurations.push(d);
    });
  }

  return { words, wtimes, wdurations, visemes, vtimes, vdurations };
}

function edgeTTSEstimateBoundaries(text) {
  const parts = String(text || '').match(/[\u4e00-\u9fff]|[a-zA-Z]+|\d+|[，。！？,.!?]/g) || [];
  const boundaries = [];
  let t = 80;
  for (const part of parts) {
    if (/^[，。！？,.!?]$/.test(part)) {
      t += /[。！？.!?]/.test(part) ? 360 : 180;
      continue;
    }
    const isCjk = /^[\u4e00-\u9fff]$/.test(part);
    const durMs = isCjk ? 170 : Math.max(220, Math.min(620, 120 + part.length * 45));
    boundaries.push({ word: part, startMs: t, durMs });
    t += durMs;
  }
  return boundaries.length ? boundaries : [{ word: 'a', startMs: 80, durMs: 250 }];
}

function getLipSyncOffsetMs() {
  const el = document.getElementById('cfg-lipsync-offset');
  const n = Number(el?.value);
  if (!Number.isFinite(n)) return -120;
  return Math.max(-300, Math.min(300, n));
}

function edgeTTSBuildAnimItems(visemeData, clockStart = 0, offsetMs = 0) {
  const anims = [];
  for (let i = 0; i < visemeData.visemes.length; i++) {
    const viseme = visemeData.visemes[i];
    const time = clockStart + offsetMs + visemeData.vtimes[i];
    const duration = visemeData.vdurations[i];
    anims.push({
      template: { name: 'viseme' },
      ts: [time - 0.45 * duration, time + 0.20 * duration, time + 0.95 * duration],
      vs: {
        ['viseme_' + viseme]: [null, (viseme === 'PP' || viseme === 'FF') ? 0.95 : 0.82, 0]
      }
    });
  }
  return anims;
}

function playSpeechSynthesisWithManualLipSync(text) {
  if (!window.speechSynthesis || !head) return false;

  window.speechSynthesis.cancel();
  const utterance = new SpeechSynthesisUtterance(text);
  utterance.lang = 'zh-CN';
  utterance.rate = 1.1;
  utterance.pitch = 1.2;
  const voices = window.speechSynthesis.getVoices();
  const zhVoice = voices.find(v => v.lang.startsWith('zh'));
  if (zhVoice) utterance.voice = zhVoice;

  const boundaries = edgeTTSEstimateBoundaries(text);
  const visemeData = edgeTTSBuildVisemes(boundaries);
  const payloadForDebug = { ...visemeData, estimatedBoundaries: boundaries };

  let lipSyncQueued = false;
  let fallbackTimer = null;
  const queueLipSync = (mode) => {
    if (lipSyncQueued) return;
    lipSyncQueued = true;
    if (fallbackTimer) clearTimeout(fallbackTimer);

    const offsetMs = getLipSyncOffsetMs();
    // Anchor to the actual speech start when available. The offset is deliberately
    // user-tunable: negative values make mouth shapes lead audio, which usually
    // feels more natural visually than lagging behind speech.
    const clockStart = (head.animClock || 0);
    try { head.lookAtCamera?.(500); } catch(e) {}
    try { head.speakWithHands?.(); } catch(e) {}
    try { head.resetLips?.(); } catch(e) {}

    const anims = edgeTTSBuildAnimItems(visemeData, clockStart, offsetMs);
    head.animQueue.push(...anims);

    debugState.lastSpeakAudioPayload = payloadForDebug;
    debugState.lastSpeakAudioOptions = { mode, offsetMs };
    debugState.events.push({ type: 'speech-synthesis-manual-lipsync-queued', mode, offsetMs, visemeCount: visemeData.visemes.length, animCount: anims.length, at: Date.now() });
    console.log(`SpeechSynthesis manual lip sync: ${visemeData.visemes.length} visemes queued, offset ${offsetMs}ms`, payloadForDebug);
  };

  utterance.onstart = () => {
    debugState.events.push({ type: 'speech-synthesis-start', at: Date.now() });
    queueLipSync('speechSynthesis-onstart');
  };

  utterance.onend = () => {
    setTimeout(() => {
      try { head.resetLips?.(); } catch(e) {}
    }, 120);
    debugState.events.push({ type: 'speech-synthesis-manual-lipsync-end', at: Date.now() });
  };

  utterance.onerror = (event) => {
    debugState.lastError = { message: `SpeechSynthesis ${event.error || 'error'}`, at: Date.now() };
    debugState.events.push({ type: 'speech-synthesis-error', message: event.error || 'error', at: Date.now() });
  };

  debugState.lastEdgeResult = { text, boundaryCount: 0, boundaries, estimated: true, reason: 'Edge TTS unavailable; SpeechSynthesis audio with manual TalkingHead animQueue lip-sync' };
  window.speechSynthesis.speak(utterance);

  // Safety net for autoplay-blocked or delayed SpeechSynthesis implementations:
  // keep lips moving, but prefer onstart when it fires quickly.
  fallbackTimer = setTimeout(() => queueLipSync('speechSynthesis-fallback-timer'), 220);
  return true;
}

/**
 * Full Edge TTS pipeline: WebSocket → word boundaries + audio → TalkingHead speakAudio.
 */
async function edgeTTSSpeak(text) {
  const voice = 'zh-CN-XiaoxiaoNeural';
  const secMsGEC = await edgeTTSGenerateSecMsGec(EDGE_TTS_CONFIG.TRUSTED_CLIENT_TOKEN);
  const reqId = edgeTTSGenerateUUID();
  const url = `${EDGE_TTS_CONFIG.WSS_URL}?TrustedClientToken=${EDGE_TTS_CONFIG.TRUSTED_CLIENT_TOKEN}&Sec-MS-GEC=${secMsGEC}&Sec-MS-GEC-Version=${EDGE_TTS_CONFIG.VERSION_MS_GEC}&ConnectionId=${reqId}`;

  const ws = new WebSocket(url);
  const audioChunks = [];
  const boundaries = []; // {word, startMs, durMs}[]
  let pendingReads = 0; // Track pending FileReader operations

  await new Promise((resolve, reject) => {
    const timeout = setTimeout(() => { ws.close(); reject(new Error('Edge TTS timeout')); }, 30000);

    ws.onopen = () => {
      // 1. Send speech config (wordBoundaryEnabled: true)
      ws.send(edgeTTSBuildConfig());
      // 2. Send SSML request
      ws.send(`X-RequestId:${reqId}\r\nContent-Type:application/ssml+xml\r\nX-Timestamp:${new Date().toUTCString()}\r\nPath:ssml\r\n\r\n${edgeTTSCreateSSML(text, voice)}`);
    };

    ws.onmessage = (event) => {
      if (typeof event.data === 'string') {
        // Text message: check for word boundary data or turn.end
        if (event.data.includes('Path:turn.end')) {
          ws.close();
          return;
        }
        // Parse word boundary from Path:rbsp / Path:response messages
        const wb = edgeTTSParseWordBoundary(event.data);
        if (wb) {
          boundaries.push(wb);
        }
      } else {
        // Binary message: extract audio data after "Path:audio\r\n" header
        pendingReads++;
        const reader = new FileReader();
        reader.onload = () => {
          const arr = new Uint8Array(reader.result);
          const start = edgeTTSFindAudio(arr);
          if (start !== -1) audioChunks.push(arr.slice(start));
          pendingReads--;
        };
        reader.readAsArrayBuffer(event.data);
      }
    };

    ws.onerror = () => { clearTimeout(timeout); reject(new Error('Edge TTS WebSocket error')); };
    ws.onclose = () => {
      clearTimeout(timeout);
      // Wait for all pending FileReader operations to complete before resolving
      const waitReads = () => {
        if (pendingReads > 0) {
          setTimeout(waitReads, 10);
        } else {
          resolve();
        }
      };
      waitReads();
    };
  });

  // Combine all audio chunks
  const total = audioChunks.reduce((acc, c) => acc + c.length, 0);
  const combined = new Uint8Array(total);
  let off = 0;
  for (const chunk of audioChunks) { combined.set(chunk, off); off += chunk.length; }
  if (combined.length === 0) throw new Error('No audio received from Edge TTS');

  return {
    audioBuffer: combined.buffer,
    boundaries, // Array of {word, startMs, durMs}
  };
}

/**
 * Fallback using Edge TTS with real word boundary lip sync.
 * Decodes MP3 → AudioBuffer, extracts word timing, calls head.speakAudio().
 */
async function edgeTTSFallback(text) {
  try {
    addSystemMsg('🔊 阿搞用免费语音说话中...');

    const result = await edgeTTSSpeak(text);

    // Decode MP3 to AudioBuffer
    const audioBuffer = await head.audioCtx.decodeAudioData(result.audioBuffer.slice(0));

    const { boundaries } = result;

    if (boundaries.length > 0) {
      // Use REAL word boundaries from Edge TTS for timing, plus explicit visemes
      // so lip-sync survives without Google TTS and works for both English and Chinese.
      const { words, wtimes, wdurations, visemes, vtimes, vdurations } = edgeTTSBuildVisemes(boundaries);
      const payload = {
        words,
        wtimes,
        wdurations,
        visemes,
        vtimes,
        vdurations,
        audio: audioBuffer,
      };
      const options = { lipsyncLang: 'en' };

      debugState.lastEdgeResult = { text, boundaryCount: boundaries.length, boundaries, audioDuration: audioBuffer.duration };
      debugState.lastSpeakAudioPayload = { words, wtimes, wdurations, visemes, vtimes, vdurations, audioDuration: audioBuffer.duration };
      debugState.lastSpeakAudioOptions = options;
      debugState.events.push({ type: 'edge-tts-speakAudio', boundaryCount: boundaries.length, visemeCount: visemes.length, audioDuration: audioBuffer.duration, at: Date.now() });
      console.log(`Edge TTS: ${boundaries.length} word boundaries, ${visemes.length} visemes, lip sync enabled`, debugState.lastSpeakAudioPayload);

      head.speakAudio(payload, options);
    } else {
      // Fallback: no boundaries received, estimate word timing from text + audio duration
      console.warn('No word boundaries from Edge TTS, using estimated timing');
      const audioDurMs = audioBuffer.duration * 1000;
      const words = text.match(/[\u4e00-\u9fff]|[a-zA-Z0-9]+/g) || [text];
      const perWord = audioDurMs / Math.max(words.length, 1);
      const wtimes = words.map((_, i) => Math.round(i * perWord));
      const wdurations = words.map(() => Math.round(perWord));
      const estimated = edgeTTSBuildVisemes(
        words.map((word, i) => ({ word, startMs: wtimes[i], durMs: wdurations[i] }))
      );
      const payload = {
        words: estimated.words,
        wtimes: estimated.wtimes,
        wdurations: estimated.wdurations,
        visemes: estimated.visemes,
        vtimes: estimated.vtimes,
        vdurations: estimated.vdurations,
        audio: audioBuffer,
      };
      const options = { lipsyncLang: 'en' };
      debugState.lastEdgeResult = { text, boundaryCount: 0, boundaries: [], audioDuration: audioBuffer.duration, estimated: true };
      debugState.lastSpeakAudioPayload = { ...payload, audio: undefined, audioDuration: audioBuffer.duration };
      debugState.lastSpeakAudioOptions = options;
      debugState.events.push({ type: 'edge-tts-speakAudio-estimated', visemeCount: estimated.visemes.length, audioDuration: audioBuffer.duration, at: Date.now() });

      head.speakAudio(payload, options);
    }
  } catch (err) {
    debugState.lastError = { message: err.message, stack: err.stack, at: Date.now() };
    debugState.events.push({ type: 'edge-tts-error', message: err.message, at: Date.now() });
    console.warn('Edge TTS failed, using browser SpeechSynthesis with manual TalkingHead lip-sync:', err);
    // Browser WebSocket access to Edge TTS can be blocked (no audio/boundaries).
    // Keep the free TTS fallback audible, but drive TalkingHead visemes manually.
    playSpeechSynthesisWithManualLipSync(text);
  }
}

// ===== Dance — Procedural Bone Animation =====
// Uses head.animQueue + gesture system for reliable, rhythmic dance moves.
// No FBX dependency — works with any Ready Player Me avatar skeleton.

// Dance beat timing (BPM 128 → ~470ms per beat)
const DANCE_BPM = 128;
const DANCE_BEAT_MS = Math.round(60000 / DANCE_BPM);

// Queue a single animation keyframe into head.animQueue
function danceKeyframe(startMs, morph, startVal, peakVal, endVal) {
  const dur = DANCE_BEAT_MS * 0.45;
  head.animQueue.push({
    template: { name: 'pose' },
    ts: [startMs, startMs + dur * 0.3, startMs + dur],
    vs: { [morph]: [startVal, peakVal, endVal] }
  });
}

// Queue a smooth sinusoidal sway over a duration
function danceSway(tStart, tEnd, morph, amplitude, cycles) {
  const step = DANCE_BEAT_MS * 0.5;
  for (let t = tStart; t < tEnd; t += step) {
    const progress = (t - tStart) / (tEnd - tStart);
    const angle = Math.sin(progress * Math.PI * 2 * cycles) * amplitude;
    danceKeyframe(t, morph, null, angle, null);
  }
}

// Full dance routine — ~16 seconds of rhythmic moves
function danceRoutine() {
  if (!head || !isReady) return;
  addSystemMsg('💃 阿搞开始跳舞啦！🎶');
  speakText('哟哟哟！音乐走起！看我给老板秀一段！');

  const baseTime = head.animClock || 0;
  const offset = 50; // small initial pause

  // ── Phase 1: Warm-up sway (0–4s) ──
  // Hip sway side to side with slight head bob
  for (let i = 0; i < 8; i++) {
    const t = baseTime + offset + i * DANCE_BEAT_MS * 0.75;
    const direction = i % 2 === 0 ? 0.25 : -0.25;
    // Body lean
    danceKeyframe(t, 'bodyRotateY', null, direction, null);
    // Counter-head lean (natural)
    danceKeyframe(t, 'headRotateY', null, -direction * 0.5, null);
    // Slight body bounce
    danceKeyframe(t, 'bodyRotateX', null, i % 2 === 0 ? 0.08 : -0.05, null);
  }

  // ── Phase 2: Groove with arm gestures (4–8s) ──
  const p2 = baseTime + offset + 8 * DANCE_BEAT_MS * 0.75 + 200;
  for (let i = 0; i < 6; i++) {
    const t = p2 + i * DANCE_BEAT_MS;
    const direction = i % 2 === 0 ? 0.3 : -0.3;
    danceKeyframe(t, 'bodyRotateY', null, direction, null);
    // Head movement
    danceKeyframe(t, 'headRotateZ', null, i % 2 === 0 ? 0.06 : -0.06, null);
    danceKeyframe(t, 'headRotateX', null, 0.08, null);
    // Body roll
    const rollT = p2 + i * DANCE_BEAT_MS + DANCE_BEAT_MS * 0.25;
    danceKeyframe(rollT, 'bodyRotateX', null, 0.12, null);
  }

  // Play arm gestures during phase 2
  const gestureNames = ['handup', 'side', 'shrug', 'namaste'];
  setTimeout(() => {
    if (!head) return;
    head.playGesture('handup', 1000, true, undefined);
    setTimeout(() => head?.playGesture('side', 800, false, undefined), 1000);
    setTimeout(() => head?.playGesture('shrug', 600, true, undefined), 2200);
    setTimeout(() => head?.playGesture('namaste', 700, false, undefined), 3400);
  }, 4200);

  // ── Phase 3: Big moves (8–12s) ──
  const p3 = baseTime + offset + 14 * DANCE_BEAT_MS * 0.75 + 500;
  for (let i = 0; i < 8; i++) {
    const t = p3 + i * DANCE_BEAT_MS * 0.6;
    const phase = (i % 4);
    switch (phase) {
      case 0: // twist right
        danceKeyframe(t, 'bodyRotateY', null, 0.35, null);
        danceKeyframe(t, 'headRotateX', null, 0.1, null);
        break;
      case 1: // twist left
        danceKeyframe(t, 'bodyRotateY', null, -0.35, null);
        danceKeyframe(t, 'headRotateX', null, -0.05, null);
        break;
      case 2: // body dip
        danceKeyframe(t, 'bodyRotateX', null, 0.2, null);
        danceKeyframe(t, 'headRotateY', null, 0.15, null);
        break;
      case 3: // body rise
        danceKeyframe(t, 'bodyRotateX', null, -0.1, null);
        danceKeyframe(t, 'headRotateY', null, -0.15, null);
        break;
    }
  }

  // More gestures during phase 3
  setTimeout(() => {
    if (!head) return;
    head.playGesture('handup', 800, false, undefined);
    setTimeout(() => head?.playGesture('ok', 500, true, undefined), 1200);
    setTimeout(() => head?.playGesture('index', 600, false, undefined), 2400);
  }, 8200);

  // ── Phase 4: Hip sway + hand wave (12–15s) ──
  const p4 = baseTime + offset + 22 * DANCE_BEAT_MS * 0.6 + 300;
  for (let i = 0; i < 6; i++) {
    const t = p4 + i * DANCE_BEAT_MS * 0.7;
    const sway = Math.sin(i * 0.8) * 0.28;
    danceKeyframe(t, 'bodyRotateY', null, sway, null);
    danceKeyframe(t, 'bodyRotateZ', null, sway * 0.3, null);
    danceKeyframe(t, 'headRotateZ', null, -sway * 0.4, null);
  }

  // Final gesture
  setTimeout(() => {
    if (!head) return;
    head.playGesture('thumbup', 900, true, undefined);
  }, 13000);

  // ── Reset to neutral after dance ──
  setTimeout(() => {
    if (!head) return;
    // Graceful return to neutral
    const t = (head.animClock || 0) + 50;
    head.animQueue.push({
      template: { name: 'pose' },
      ts: [t, t + 300, t + 600],
      vs: {
        bodyRotateY: [null, null, 0],
        bodyRotateX: [null, null, 0],
        bodyRotateZ: [null, null, 0],
        headRotateX: [null, null, 0],
        headRotateY: [null, null, 0],
        headRotateZ: [null, null, 0],
      }
    });
    try { head.resetLips?.(); } catch(e) {}
    addSystemMsg('💃 跳完啦！过瘾！');
  }, 15500);
}

window.doDance = function() {
  if (!head) return;
  danceRoutine();
};

// ===== Chat (LLM) =====
function normalizeLLMUrl(rawUrl) {
  const url = new URL(rawUrl);
  const path = url.pathname.replace(/\/+$/, '');
  if (url.hostname.includes('openrouter.ai')) {
    if (path === '' || path === '/api/v1') {
      url.pathname = '/api/v1/chat/completions';
    }
  }
  return url;
}

window.sendMessage = async function() {
  const text = chatInput.value.trim();
  if (!text) return;

  chatInput.value = '';
  addMessage(text, 'user');

  const llmKey = document.getElementById('cfg-llm-key').value.trim();
  const llmUrl = document.getElementById('cfg-llm-url').value.trim();
  const llmModel = document.getElementById('cfg-llm-model').value.trim();
  const prompt = document.getElementById('cfg-prompt').value;
  const name = document.getElementById('cfg-name').value || '阿搞';

  if (!llmKey) {
    addMessage(`${name}说: ${text}（配置API Key后可智能回复）`, 'bot');
    return;
  }

  let apiUrl;
  try {
    apiUrl = normalizeLLMUrl(llmUrl);
  } catch {
    addMessage(`⚠️ API 地址格式不对: "${llmUrl}"`, 'bot');
    return;
  }

  try {
    const messages = [
      { role: 'system', content: prompt },
      ...chatHistory.slice(-10),
      { role: 'user', content: text }
    ];

    const controller = new AbortController();
    const timeoutId = setTimeout(() => controller.abort(), 30000);

    // Keep browser LLM requests minimal for Microsoft Edge compatibility.
    // Some Edge privacy/tracking settings block third-party requests with extra
    // metadata headers even when the API CORS preflight allows them.
    const reqHeaders = {
      'Content-Type': 'application/json',
      'Authorization': `Bearer ${llmKey}`,
    };

    const resp = await fetch(apiUrl.toString(), {
      method: 'POST',
      mode: 'cors',
      headers: reqHeaders,
      body: JSON.stringify({
        model: llmModel,
        messages: messages,
        stream: false,
        max_tokens: 500
      }),
      signal: controller.signal
    });

    clearTimeout(timeoutId);

    if (!resp.ok) {
      const errText = await resp.text().catch(() => '');
      throw new Error(`API ${resp.status} ${resp.statusText}${errText ? ': ' + errText.slice(0,100) : ''}`);
    }

    const data = await resp.json();
    const reply = data.choices?.[0]?.message?.content || '嗯...我词穷了';

    chatHistory.push({ role: 'user', content: text });
    chatHistory.push({ role: 'assistant', content: reply });

    detectMoodFromText(reply);

    addMessage(reply, 'bot');
    speakText(reply);

  } catch (err) {
    if (err.name === 'AbortError') {
      addMessage('⚠️ 阿搞卡住了: 请求超时（30秒），请检查网络或 API 地址', 'bot');
    } else if (err.message === 'Failed to fetch' || err.message.includes('NetworkError') || err.message.includes('network')) {
      addMessage('⚠️ 阿搞卡住了: 浏览器无法连接 LLM API。请确认 API 地址是 https://openrouter.ai/api/v1/chat/completions，Key 没有多余空格；如果仍失败，打开开发者工具 Console 查看 fetch 详情。', 'bot');
      console.error('LLM fetch failed:', { url: apiUrl.toString(), host: apiUrl.hostname, message: err.message, error: err });
    } else {
      addMessage(`⚠️ 阿搞卡住了: ${err.message}`, 'bot');
    }
  }
};

function detectMoodFromText(text) {
  const moodMap = [
    { words: ['哈哈','笑死','搞笑','逗','整活','嗨'], mood: 'happy' },
    { words: ['爱','喜欢','亲','么','贴贴'], mood: 'love' },
    { words: ['气','烦','滚','火大'], mood: 'angry' },
    { words: ['哭','难过','伤心','呜呜'], mood: 'sad' },
    { words: ['怕','慌','救命'], mood: 'fear' },
    { words: ['呕','恶心','嫌弃'], mood: 'disgust' },
    { words: ['困','累','睡'], mood: 'sleep' },
  ];
  for (const entry of moodMap) {
    if (entry.words.some(w => text.includes(w))) {
      setMood(entry.mood);
      return;
    }
  }
  setMood('neutral');
}

// ===== Voice Input =====
window.toggleMic = function() {
  const btn = document.getElementById('mic-btn');
  if (isListening) {
    stopListening();
    btn.classList.remove('listening');
    btn.textContent = '🎤';
    isListening = false;
  } else {
    startListening();
    btn.classList.add('listening');
    btn.textContent = '🔴';
    isListening = true;
  }
};

function startListening() {
  if (!('webkitSpeechRecognition' in window) && !('SpeechRecognition' in window)) {
    addSystemMsg('⚠️ 浏览器不支持语音输入，请用 Chrome');
    return;
  }

  const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
  recognition = new SpeechRecognition();
  recognition.lang = 'zh-CN';
  recognition.continuous = false;
  recognition.interimResults = false;

  recognition.onresult = (event) => {
    const transcript = event.results[0][0].transcript;
    chatInput.value = transcript;
    stopListening();
    document.getElementById('mic-btn').classList.remove('listening');
    document.getElementById('mic-btn').textContent = '🎤';
    isListening = false;
    sendMessage();
  };

  recognition.onerror = (event) => {
    console.warn('Speech error:', event.error);
    stopListening();
    document.getElementById('mic-btn').classList.remove('listening');
    document.getElementById('mic-btn').textContent = '🎤';
    isListening = false;
    if (event.error !== 'no-speech') {
      addSystemMsg(`⚠️ 语音识别出错: ${event.error}`);
    }
  };

  recognition.start();
}

function stopListening() {
  if (recognition) {
    try { recognition.stop(); } catch(e) {}
    recognition = null;
  }
}

// ===== UI Helpers =====
function addMessage(text, role, mood) {
  const div = document.createElement('div');
  div.className = `msg ${role}`;
  if (mood) div.innerHTML = `<span class="mood-tag">${moodIcons[mood] || ''}</span>${escHtml(text)}`;
  else div.textContent = text;
  chatMessages.appendChild(div);
  chatMessages.scrollTop = chatMessages.scrollHeight;
}

function addSystemMsg(text) {
  const div = document.createElement('div');
  div.className = 'msg system';
  div.textContent = text;
  chatMessages.appendChild(div);
  chatMessages.scrollTop = chatMessages.scrollHeight;
}

function escHtml(str) {
  const d = document.createElement('div');
  d.textContent = str;
  return d.innerHTML;
}
